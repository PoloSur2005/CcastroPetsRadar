version: '3.9'

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: petradar_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-petradar}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - petradar_db_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petradar_api
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3000}
    ports:
      - '${PORT:-3000}:3000'

volumes:
  petradar_db_data:
